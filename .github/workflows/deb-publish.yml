name: Build and publish .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image and package .deb
        run: |
          docker build -t tetris-builder -f .github/workflows/Dockerfile .

      - name: Extract .deb from Docker image
        run: |
          docker create --name extractor tetris-builder
          mkdir -p dist
          docker cp extractor:/output/. ./dist/
          docker rm extractor

      - name: Find .deb file path
        id: deb-info
        run: |
          deb_file=$(ls dist/*.deb | head -n 1)
          echo "path=$deb_file" >> $GITHUB_OUTPUT
          echo "name=$(basename $deb_file)" >> $GITHUB_OUTPUT
          echo "Found .deb file: $deb_file"

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb-info.outputs.name }}
          path: ${{ steps.deb-info.outputs.path }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.deb-info.outputs.path }}
          generate_release_notes: true
