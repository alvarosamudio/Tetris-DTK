name: Build and publish .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_image: linuxdeepin/deepin:crimson
          - arch: arm64
            platform: linux/arm64
            base_image: linuxdeepin/deepin:crimson-arm64
          - arch: riscv64
            platform: linux/riscv64
            base_image: linuxdeepin/deepin:crimson-riscv64
          - arch: loong64
            platform: linux/loong64
            base_image: linuxdeepin/deepin:crimson-loong64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image and package .deb
        run: |
          mkdir -p dist
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --output type=local,dest=dist \
            --cache-from type=gha,scope=${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.arch }} \
            -t tetris-builder:${{ matrix.arch }} \
            -f .github/workflows/Dockerfile .

      - name: Find .deb file path
        id: deb-info
        run: |
          deb_file=$(ls dist/*.deb | head -n 1)
          echo "path=$deb_file" >> $GITHUB_OUTPUT
          echo "name=$(basename $deb_file)" >> $GITHUB_OUTPUT
          echo "Found .deb file: $deb_file"

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.deb-info.outputs.name }}
          path: ${{ steps.deb-info.outputs.path }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.deb-info.outputs.path }}
          generate_release_notes: true
