name: Build and publish .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper-compat \
            qt5-qmake \
            qtbase5-dev \
            qtmultimedia5-dev \
            libdtkwidget-dev

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(dpkg-parsechangelog -S Version)" >> $GITHUB_OUTPUT
          fi

      - name: Find .deb
        id: deb
        run: |
          deb_file=$(ls ../*.deb | head -1)
          echo "path=$deb_file" >> $GITHUB_OUTPUT
          echo "name=$(basename $deb_file)" >> $GITHUB_OUTPUT

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb.outputs.name }}
          path: ${{ steps.deb.outputs.path }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.deb.outputs.path }}
          generate_release_notes: true
